name: Google Play Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix gradlew line endings
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode Keystore (Skipped, already in repo)
        run: echo "Keystore is already in the repository."

      - name: Create key.properties
        run: |
          echo "storePassword=securescan123" > android/key.properties
          echo "keyPassword=securescan123" >> android/key.properties
          echo "keyAlias=app-release" >> android/key.properties
          echo "storeFile=../app-release.jks" >> android/key.properties

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true
          working-directory: android

      - name: Deploy to Google Play
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_CONFIG_JSON }}
        run: |
          echo "$PLAY_SERVICE_ACCOUNT_JSON" > android/fastlane-service-account.json
          cd android
          bundle exec fastlane deploy_production

      - name: Cleanup
        if: always()
        run: |
          rm -f android/app-release.jks
          rm -f android/key.properties
          rm -f android/fastlane-service-account.json
